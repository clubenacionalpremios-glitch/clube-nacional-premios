<script>
  const SUPABASE_URL = "https://frcolkudeiddfddccvmi.supabase.co";
  const SUPABASE_KEY = "sb_publishable_yu4G73-jorUbTivFrSM3Gg_t9UZt31G";

  const params = new URLSearchParams(window.location.search);
  const ref = params.get("ref") || "";

  const form = document.getElementById("formCadastro");
  const mensagem = document.getElementById("mensagem");

  function limparNumeros(valor) {
    return valor.replace(/\D/g, "");
  }

  function validarCPF(cpf) {
    cpf = limparNumeros(cpf);

    if (cpf.length !== 11) return false;
    if (/^(\d)\1{10}$/.test(cpf)) return false;

    let soma = 0;

    for (let i = 0; i < 9; i++) {
      soma += parseInt(cpf.charAt(i)) * (10 - i);
    }

    let resto = (soma * 10) % 11;
    if (resto === 10 || resto === 11) resto = 0;
    if (resto !== parseInt(cpf.charAt(9))) return false;

    soma = 0;

    for (let i = 0; i < 10; i++) {
      soma += parseInt(cpf.charAt(i)) * (11 - i);
    }

    resto = (soma * 10) % 11;
    if (resto === 10 || resto === 11) resto = 0;

    return resto === parseInt(cpf.charAt(10));
  }

  function validarWhatsApp(whatsapp) {
    const numero = limparNumeros(whatsapp);
    return numero.length === 10 || numero.length === 11;
  }

  function validarEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  document.getElementById("cpf").addEventListener("input", function(e) {
    let v = e.target.value.replace(/\D/g, "");
    v = v.replace(/(\d{3})(\d)/, "$1.$2");
    v = v.replace(/(\d{3})(\d)/, "$1.$2");
    v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
    e.target.value = v;
  });

  document.getElementById("whatsapp").addEventListener("input", function(e) {
    let v = e.target.value.replace(/\D/g, "");
    v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
    v = v.replace(/(\d{5})(\d{4})$/, "$1-$2");
    e.target.value = v;
  });

  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    if (!ref) {
      mostrarMensagem("Link inválido. Solicite um novo link ao seu cambista.", false);
      return;
    }

    const nome = document.getElementById("nome").value.trim();
    const cpf = document.getElementById("cpf").value.trim();
    const whatsapp = document.getElementById("whatsapp").value.trim();
    const email = document.getElementById("email").value.trim();
    const cidade = document.getElementById("cidade").value.trim();
    const estado = document.getElementById("estado").value;

    if (!validarCPF(cpf)) {
      mostrarMensagem("CPF inválido. Confira os dados e tente novamente.", false);
      return;
    }

    if (!validarWhatsApp(whatsapp)) {
      mostrarMensagem("WhatsApp inválido. Informe DDD + número completo.", false);
      return;
    }

    if (!validarEmail(email)) {
      mostrarMensagem("E-mail inválido. Confira o endereço informado.", false);
      return;
    }

    const pin = "CNP-" + Math.floor(100000 + Math.random() * 900000);
    const tokenConfirmacao = crypto.randomUUID();

    try {
      const verificar = await fetch(
        `${SUPABASE_URL}/rest/v1/clientes?cpf=eq.${cpf}`,
        {
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`
          }
        }
      );

      const existente = await verificar.json();

      if (existente.length > 0) {
        mostrarMensagem("CPF já cadastrado.", false);
        return;
      }

      const resposta = await fetch(
        `${SUPABASE_URL}/rest/v1/clientes`,
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`,
            Prefer: "return=minimal"
          },
          body: JSON.stringify({
            nome,
            cpf,
            whatsapp,
            email,
            cidade,
            estado,
            cambista: ref,
            pin,
            email_confirmado: false,
            whatsapp_confirmado: false,
            status_cliente: "Pendente",
            token_confirmacao: tokenConfirmacao
          })
        }
      );

      if (!resposta.ok) {
        throw new Error("Erro ao salvar");
      }

      await fetch("/api/send-email", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          email,
          nome,
          pin,
          tokenConfirmacao
        })
      });

      mostrarMensagem(
        `Cadastro realizado com sucesso!<br><br>
        <strong>Seu número da sorte é: ${pin}</strong><br><br>
        📩 Enviamos um e-mail para você confirmar sua participação.`,
        true
      );

      form.reset();

    } catch (erro) {
      console.error(erro);
      mostrarMensagem("Erro ao finalizar cadastro.", false);
    }
  });

  function mostrarMensagem(texto, sucesso) {
    mensagem.innerHTML = texto;
    mensagem.className = sucesso ? "msg sucesso" : "msg erro";
    mensagem.style.display = "block";
  }
</script>
